<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LPB Hub — La Planète Bois</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="logo"><i class="fas fa-tree"></i></div>
      <h1>LPB Hub<small>La Planete Bois</small></h1>
    </div>
    <nav class="sidebar-nav">
      <div class="section-label">Principal</div>
      <a data-page="dashboard" class="active"><i class="fas fa-chart-pie"></i> Tableau de bord</a>
      <a data-page="crm"><i class="fas fa-users"></i> CRM</a>
      <a data-page="ads"><i class="fas fa-bullhorn"></i> Ads</a>
      <a data-page="seo"><i class="fas fa-search"></i> SEO</a>
      <a data-page="analytics"><i class="fas fa-chart-line"></i> Analytics</a>
      <a data-page="gbp"><i class="fab fa-google"></i> Google Business</a>
      <a data-page="devis"><i class="fas fa-file-invoice-dollar"></i> Devis</a>
      <a data-page="suivi"><i class="fas fa-handshake"></i> Suivi client</a>
      <a data-page="commandes"><i class="fas fa-box"></i> Commandes</a>
      <a data-page="planning"><i class="fas fa-calendar-alt"></i> Planning</a>
      <div class="section-label">Commercial</div>
      <a data-page="presentation"><i class="fas fa-desktop"></i> Présentation</a>
      <div class="section-label">Outils</div>
      <a data-page="settings"><i class="fas fa-cog"></i> Parametres</a>
    </nav>
    <div class="sidebar-footer">LPB Hub v2.0 &mdash; 2025</div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-icon" id="menu-toggle" style="display:none"><i class="fas fa-bars"></i></button>
        <h2 id="page-title">Tableau de bord</h2>
      </div>
      <div class="topbar-right">
        <div class="topbar-search">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Rechercher..." id="global-search">
        </div>
        <button class="btn-icon" id="btn-refresh" title="Rafraichir"><i class="fas fa-sync-alt"></i></button>
        <button class="btn-icon" id="btn-windsor-sync" title="Sync Windsor.ai (Google)" style="position:relative"><i class="fab fa-google"></i></button>
        <button class="btn-icon" id="btn-notif" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="badge" id="notif-badge" style="display:none">0</span>
        </button>
      </div>
    </header>
    <div class="content" id="content">
      <!-- Dynamic content -->
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Titre</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- TOASTS -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
